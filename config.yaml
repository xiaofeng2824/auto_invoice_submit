pdf:
  input_dir: "/home/charles/7.2"
  output_dir: "./data/renamed_pdfs"
  failed_dir: "./data/failed_pdfs"

invoice:
  # 备注栏中常见订单号关键字。程序会先按关键字提取，失败后再从备注附近兜底提取长数字。
  order_keywords:
    - "订单号"
    - "订单编号"
    - "订单ID"
    - "商户订单号"
    - "交易订单号"
    - "抖音订单号"
  # 如果你的订单号长度固定，可以调整这里。
  order_pattern: "[A-Za-z0-9_-]{8,40}"

record:
  path: "./data/invoice_records.csv"

browser:
  backend_url: "https://fxg.jinritemai.com/"
  storage_state_path: "./browser_state/douyin_storage_state.json"
  headless: false
  slow_mo: 100
  timeout_ms: 3000000
  # auto 会自动查找本机 Chrome / Edge / Chromium；找不到则回退到 Playwright 自带 Chromium。
  executable_path: "auto"
  # 也可手动指定 Playwright channel，例如 chrome / msedge。设置 executable_path 后优先使用 executable_path。
  channel: ""

# 抖音后台页面可能变化，建议首次 dry_run=true 调试选择器。
# selector 支持 Playwright 文本选择器、CSS、XPath 等。
douyin:
  invoice_management_url: "https://fxg.jinritemai.com/ffa/morder/receipt/list?btm_ppre=a2427.b76571.c902327.d871297&btm_pre=a2427.b76571.c902327.d608306&btm_show_id=ba965cb8-0f77-44a3-b4b4-45ad5bfa930a"  # 如果知道发票管理直达 URL，可填这里，优先使用。
  selectors:
    funds_menu: "text=资金"
    invoice_menu: "text=发票管理"
    pending_tab: "text=待开票"
    order_input: "input[placeholder*='订单'], input[placeholder*='订单号']"
    search_button: "text=查询"
    upload_button: "text=上传发票"
    confirm_button: "text=确定"
    # 子页面（上传弹窗）上的按钮
    subpage_upload_button: "text=上传发票"
    subpage_file_input: "input[type='file']"
    subpage_submit_button: "text=提交"
    subpage_success_indicator: "text=上传成功"
    confirm_dialog_button: "button:text-is('确认'), button:text-is('确定'), button:text-is('是'), button:text-is('提交')"

upload:
  dry_run: false
  # 上传失败后重试次数（含首次），每次重试会重新执行上传操作并复搜验证
  retry_count: 3
  pause_after_open: false
  screenshot_dir: "./data/screenshots"
  # 提交后复搜验证的最大等待预算（毫秒），命中即提前退出
  verify_delay_ms: 3000
  # 复搜轮询间隔（毫秒），每隔这段时间复搜一次直到订单消失或耗尽预算
  verify_poll_interval_ms: 500
  # 点击提交后等待确认按钮出现的最长时间（毫秒）
  confirm_button_timeout_ms: 10000
